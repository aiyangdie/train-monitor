name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller

      - name: Build
        run: python -m PyInstaller --onefile --windowed --name train-monitor --noconfirm monitor_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: train-monitor-windows-x86_64
          path: dist/train-monitor.exe

      - name: Prepare release asset
        id: release
        shell: pwsh
        run: |
          $src = "dist\train-monitor.exe"
          $dst = "train-monitor-windows-x86_64.exe"
          Copy-Item $src $dst
          (Get-Item $dst).Length / 1MB
          "asset_name=$dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset_path=$dst" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Release Windows artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: train-monitor ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.release.outputs.asset_path }}

  build-macos:
    name: macOS (universal / x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade pyinstaller

      - name: Build
        run: python3 -m PyInstaller --onefile --windowed --name train-monitor --noconfirm monitor_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: train-monitor-macos-x86_64
          path: dist/train-monitor

      - name: Prepare release asset
        id: release
        run: |
          src="dist/train-monitor"
          arch=$(file "$src" | grep -oE 'x86_64|arm64|universal' | head -n1 || echo "x86_64")
          dst="train-monitor-macos-${arch}"
          cp "$src" "$dst"
          chmod +x "$dst"
          ls -lh "$dst"
          echo "asset_name=$dst" >> $GITHUB_OUTPUT
          echo "asset_path=$dst" >> $GITHUB_OUTPUT

      - name: Release macOS artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: train-monitor ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.release.outputs.asset_path }}
